<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Access</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ffcc;
  font-family: monospace;
  overflow: hidden;
}

/* MATRIX BG */
canvas {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* CENTER BOX */
#loginBox {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  border: 1px solid #00ffcc;
  padding: 30px;
  text-align: center;
  z-index: 2;
  background: rgba(0,0,0,0.8);
  box-shadow: 0 0 20px #00ffcc;
}

input {
  padding: 10px;
  margin: 10px;
  width: 200px;
  background: black;
  border: 1px solid #00ffcc;
  color: #00ffcc;
}

button {
  padding: 10px 20px;
  background: black;
  border: 1px solid #00ffcc;
  color: #00ffcc;
  cursor: pointer;
}

button:hover {
  background: #00ffcc;
  color: black;
}

/* TERMINAL */
#terminal {
  display: none;
  padding: 20px;
  z-index: 2;
  position: relative;
}

.line {
  animation: glow 1s infinite alternate;
}

@keyframes glow {
  from {text-shadow: 0 0 5px #00ffcc;}
  to {text-shadow: 0 0 20px #00ffcc;}
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="loginBox">
<h2>🔐 Secure Login</h2>
<input type="text" id="user" placeholder="Username"><br>
<input type="password" id="pass" placeholder="Password"><br>
<button onclick="login()">ACCESS</button>
<p id="msg"></p>
</div>

<div id="terminal"></div>

<script>
// MATRIX EFFECT
let c = document.getElementById("matrix");
let ctx = c.getContext("2d");

c.height = window.innerHeight;
c.width = window.innerWidth;

let letters = "01XYZHACK";
letters = letters.split("");

let font = 14;
let columns = c.width/font;
let drops = [];

for(let i=0;i<columns;i++) drops[i]=1;

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);

  ctx.fillStyle="#00ffcc";
  ctx.font=font+"px monospace";

  for(let i=0;i<drops.length;i++){
    let text=letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text,i*font,drops[i]*font);

    if(drops[i]*font>c.height && Math.random()>0.975)
      drops[i]=0;

    drops[i]++;
  }
}
setInterval(draw,33);

// LOGIN SYSTEM
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;
  let msg = document.getElementById("msg");

  msg.innerHTML = "Checking credentials...";

  setTimeout(()=>{
    if(u==="admin" && p==="1234"){
      msg.innerHTML = "✔ ACCESS GRANTED";
      document.getElementById("loginBox").style.display="none";
      startTerminal();
    } else {
      msg.innerHTML = "❌ ACCESS DENIED";
    }
  },1500);
}

// TERMINAL SIMULATION
function startTerminal(){
  let term = document.getElementById("terminal");
  term.style.display="block";

  let lines = [
    "Initializing system...",
    "Bypassing firewall...",
    "Accessing secure server...",
    "Decrypting data...",
    "██████████ 100%",
    "Welcome, Admin 😎"
  ];

  let i=0;
  function showLine(){
    if(i < lines.length){
      let div = document.createElement("div");
      div.className="line";
      div.innerText = "> " + lines[i];
      term.appendChild(div);
      i++;
      setTimeout(showLine,700);
    }
  }

  showLine();
}
</script>

</body>
</html>
