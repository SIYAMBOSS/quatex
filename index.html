
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cyber Dashboard</title>
<style>
body {
  background: black;
  color: #00ffcc;
  font-family: monospace;
  text-align: center;
}
.container {
  margin-top: 50px;
}
input, button {
  padding: 10px;
  margin: 10px;
  background: black;
  border: 1px solid #00ffcc;
  color: #00ffcc;
}
button:hover {
  background: #00ffcc;
  color: black;
}
.box {
  border: 1px solid #00ffcc;
  padding: 20px;
  margin: 20px;
}
</style>
</head>

<body>

<h1>⚡ Cyber Security Tool ⚡</h1>

<div class="container">

<div class="box">
<h2>Password Strength Checker</h2>
<input type="text" id="password" placeholder="Enter password">
<button onclick="checkPassword()">Check</button>
<p id="result"></p>
</div>

<div class="box">
<h2>Hash Generator (SHA-256)</h2>
<input type="text" id="text" placeholder="Enter text">
<button onclick="generateHash()">Generate</button>
<p id="hash"></p>
</div>

</div>

<script>
function checkPassword() {
  let pass = document.getElementById("password").value;
  let strength = "Weak";

  if(pass.length > 8 && /[A-Z]/.test(pass) && /[0-9]/.test(pass)) {
    strength = "Strong";
  } else if(pass.length > 5) {
    strength = "Medium";
  }

  document.getElementById("result").innerText = strength;
}

async function generateHash() {
  let text = document.getElementById("text").value;
  let encoder = new TextEncoder();
  let data = encoder.encode(text);
  let hashBuffer = await crypto.subtle.digest("SHA-256", data);
  let hashArray = Array.from(new Uint8Array(hashBuffer));
  let hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  document.getElementById("hash").innerText = hashHex;
}
</script>

</body>
</html>
