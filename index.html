<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cyber Terminal</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ff9f;
  font-family: monospace;
  overflow: hidden;
}

#matrix {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  padding: 20px;
}

h1 {
  text-align: center;
  text-shadow: 0 0 10px #00ff9f;
}

.terminal {
  border: 1px solid #00ff9f;
  padding: 15px;
  height: 300px;
  overflow-y: auto;
  background: rgba(0,0,0,0.8);
}

input {
  width: 80%;
  padding: 10px;
  background: black;
  border: 1px solid #00ff9f;
  color: #00ff9f;
}

button {
  padding: 10px;
  background: black;
  border: 1px solid #00ff9f;
  color: #00ff9f;
  cursor: pointer;
}

button:hover {
  background: #00ff9f;
  color: black;
}

.scan-box {
  margin-top: 20px;
  border: 1px solid #00ff9f;
  padding: 10px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">
<h1>⚡ CYBER TERMINAL ⚡</h1>

<div class="terminal" id="terminal"></div>

<input type="text" id="command" placeholder="Enter command...">
<button onclick="runCommand()">Run</button>

<div class="scan-box">
<h3>System Scan</h3>
<button onclick="startScan()">Start Scan</button>
<p id="scanResult"></p>
</div>

</div>

<script>
// MATRIX EFFECT
let canvas = document.getElementById("matrix");
let ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
letters = letters.split("");

let fontSize = 14;
let columns = canvas.width/fontSize;
let drops = [];

for(let x=0; x<columns; x++) drops[x]=1;

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#00ff9f";
  ctx.font = fontSize + "px monospace";

  for(let i=0; i<drops.length; i++){
    let text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text,i*fontSize,drops[i]*fontSize);

    if(drops[i]*fontSize > canvas.height && Math.random()>0.975)
      drops[i]=0;

    drops[i]++;
  }
}

setInterval(draw,33);

// TERMINAL
function addLine(text){
  let term = document.getElementById("terminal");
  term.innerHTML += "> " + text + "<br>";
  term.scrollTop = term.scrollHeight;
}

function runCommand(){
  let cmd = document.getElementById("command").value;
  addLine(cmd);

  if(cmd === "scan"){
    addLine("Scanning network...");
  }
  else if(cmd === "whoami"){
    addLine("Access: Guest User");
  }
  else if(cmd === "clear"){
    document.getElementById("terminal").innerHTML = "";
  }
  else{
    addLine("Unknown command");
  }
}

// SCAN ANIMATION
function startScan(){
  let result = document.getElementById("scanResult");
  result.innerHTML = "Scanning...";

  setTimeout(()=>{ result.innerHTML = "✔ System Secure"; },2000);
}
</script>

</body>
</html>
